model:
  image_size: 384
  backbone_type: hf_convnextv2
  backbone_name: shreydan/CheXpert-5-convnextv2-tiny-384
  backbone_local_files_only: false
  backbone_fallback_to_resnet: true
  num_lesions: 40
  num_diseases: 6
  num_queries: 100
  dim: 256
  num_anatomy_tokens: 8
  num_prototypes: 32
  lesion_topk: 20
  decoder_layers: 4
  reasoner_layers: 3
  nhead: 8

data:
  train_json: data/vindr_physionet_384/train.jsonl
  val_json: data/vindr_physionet_384/test.jsonl
  image_root: /kaggle/input/datasets/tuktuai/vindr-physionet-384-with-annotations
  image_size: 384
  num_workers: 2
  synthetic_train_samples: 16
  synthetic_val_samples: 8
  max_boxes_per_sample: 4

training:
  output_dir: outputs/vindr_stage1
  device: cuda
  seed: 42
  batch_size: 4
  epochs: 20
  log_every: 20
  grad_clip_norm: 1.0
  mixed_precision: false
  max_steps: null

optimizer:
  lr_backbone: 1.0e-5
  lr_main: 1.0e-4
  weight_decay: 1.0e-4

matcher:
  class_cost: 2.0
  bbox_cost: 5.0
  giou_cost: 2.0
  
loss:
  no_object_weight: 0.1
  bbox_weight: 5.0
  giou_weight: 2.0
  disease_weight: 0.0
  detection_weight: 1.0
  uncertainty_weight: 0.05
